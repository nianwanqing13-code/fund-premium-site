services:
  - type: web
    name: fund-premium-site
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # 持久化：在 Render 后台手动创建 Postgres 数据库后，
      # 把它的 Internal Database URL 作为 DATABASE_URL 环境变量填到这里（或直接在后台 Environment 添加）。
      # 不填则自动回退到本地 JSON 文件（重启会丢配置）。
      - key: DATABASE_URL
        value: ""
