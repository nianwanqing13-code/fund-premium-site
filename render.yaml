services:
  - type: web
    name: fund-premium-site
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # 持久化说明：在 Render 后台手动创建 Postgres 数据库后，
      # 把它的「Internal Database URL」作为 DATABASE_URL 环境变量加到本服务（Environment 页面），
      # 然后手动 Redeploy 即可。DATABASE_URL 不要写进本文件，否则会被这里的空值覆盖。
      # 不设置则自动回退到本地 JSON 文件（免费版重启会丢配置）。
